<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험사 AI 사례 매트릭스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:#F0F4F8;color:#1E293B;display:flex;flex-direction:column;height:100vh}

/* ── TOP HEADER ── */
.top-header{height:54px;background:#1E3A5F;display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-eyebrow{font-size:9px;font-weight:700;letter-spacing:.2em;color:#93C5FD;text-transform:uppercase}
.header-title{font-size:15px;font-weight:800;color:#fff}
.header-badge{padding:4px 11px;border-radius:999px;background:rgba(251,191,36,.2);border:1px solid rgba(251,191,36,.5);font-size:10px;color:#FDE68A;font-weight:700}
.view-toggle{margin-left:auto;display:flex;gap:5px;background:rgba(255,255,255,.1);padding:3px;border-radius:9px}
.vt-btn{padding:5px 14px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.vt-btn.active{background:#fff;color:#1E3A5F}

/* ── YEAR FILTER BAR ── */
.year-bar{height:42px;background:#fff;border-bottom:2px solid #E2E8F0;display:flex;align-items:center;padding:0 16px;gap:7px;flex-shrink:0}
.year-label{font-size:10px;color:#94A3B8;font-weight:600;margin-right:4px}
.yf-btn{padding:4px 12px;border-radius:999px;border:1.5px solid #CBD5E1;background:#fff;color:#64748B;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.yf-btn:hover{border-color:#6366F1;color:#6366F1}
.yf-btn.active{border-color:#2563EB;color:#fff;background:#2563EB}
.yf-btn.era-legacy.active{border-color:#7C3AED;color:#fff;background:#7C3AED}
.total-count{margin-left:auto;font-size:11px;color:#94A3B8}
.total-count span{color:#2563EB;font-weight:800}

/* ── MAIN LAYOUT ── */
.main-layout{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:172px;flex-shrink:0;background:#fff;border-right:2px solid #E2E8F0;overflow-y:auto;padding:10px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.group-label{font-size:9px;font-weight:800;letter-spacing:.15em;color:#94A3B8;text-transform:uppercase;padding:10px 14px 4px}
.co-item{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.co-item:hover{background:#F8FAFC}
.co-item.active{background:#EFF6FF;border-left-color:#2563EB}
.co-item.active .co-name{color:#2563EB;font-weight:700}
.co-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.co-name{font-size:11px;font-weight:500;color:#475569}
.co-cnt{margin-left:auto;font-size:9px;color:#94A3B8;background:#F1F5F9;padding:2px 6px;border-radius:999px;font-weight:700}
.sidebar-div{height:1px;background:#F1F5F9;margin:6px 0}

/* ── MATRIX VIEW ── */
.content-area{flex:1;overflow:hidden;display:flex;flex-direction:column}
.col-headers{display:grid;grid-template-columns:118px 1fr 1fr 1fr;border-bottom:2px solid #E2E8F0;flex-shrink:0;background:#fff}
.col-hdr{padding:10px 14px;border-left:1px solid #E2E8F0;display:flex;align-items:center;gap:7px}
.col-hdr-title{font-size:12px;font-weight:800;color:#1E293B}
.col-hdr-sub{font-size:10px;color:#94A3B8}
.col-icon{font-size:16px}
.table-body{flex:1;overflow-y:auto;background:#F8FAFC}
.table-body::-webkit-scrollbar{width:4px}
.table-body::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.trow{display:grid;grid-template-columns:118px 1fr 1fr 1fr;border-bottom:1px solid #E2E8F0;min-height:52px;background:#fff;transition:background .1s}
.trow:hover{background:#F8FAFC}
.trow.hl{background:#EFF6FF}
.row-co{padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:3px;border-right:1px solid #E2E8F0}
.row-co-name{font-size:11px;font-weight:800}
.row-co-type{display:inline-block;font-size:8px;padding:2px 6px;border-radius:999px;font-weight:700}
.row-cell{padding:7px 9px;border-left:1px solid #F1F5F9;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:8px;border:1.5px solid;cursor:pointer;transition:all .15s;max-width:100%}
.chip:hover{transform:translateY(-1px);filter:brightness(.95)}
.chip-title{font-size:10px;font-weight:700;line-height:1.3}
.chip-vendor{font-size:8px;opacity:.7}
.chip-arr{font-size:9px;opacity:.5;flex-shrink:0}
.chip-year{font-size:8px;padding:1px 5px;border-radius:999px;font-weight:800;flex-shrink:0}
.cell-empty{padding:7px 9px;border-left:1px solid #F1F5F9;display:flex;align-items:center;justify-content:center}
.empty-dash{width:14px;height:1px;background:#E2E8F0}

/* ── TREND VIEW ── */
.trend-layout{display:flex;flex:1;overflow:hidden}
.trend-sidebar{width:220px;flex-shrink:0;background:#fff;border-right:2px solid #E2E8F0;overflow-y:auto;padding:10px 0}
.trend-sidebar::-webkit-scrollbar{width:3px}
.trend-sidebar::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.ct-item{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.ct-item:hover{background:#F8FAFC}
.ct-item.active{background:#EFF6FF;border-left-color:#2563EB}
.ct-item.active .ct-name{color:#2563EB;font-weight:700}
.ct-icon{font-size:18px;flex-shrink:0}
.ct-name{font-size:11px;font-weight:600;color:#475569;line-height:1.4}
.ct-cnt{margin-left:auto;font-size:9px;color:#94A3B8;background:#F1F5F9;padding:2px 6px;border-radius:999px;font-weight:700;flex-shrink:0}
.trend-main{flex:1;overflow-y:auto;padding:24px;background:#F8FAFC}
.trend-main::-webkit-scrollbar{width:4px}
.trend-main::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.trend-header{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.trend-h-icon{font-size:30px;margin-bottom:8px}
.trend-h-title{font-size:18px;font-weight:800;color:#1E293B;margin-bottom:4px}
.trend-h-desc{font-size:12px;color:#64748B;line-height:1.7}
.trend-h-pills{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.trend-h-pill{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700}
.trend-timeline{position:relative}
.trend-timeline::before{content:'';position:absolute;left:64px;top:0;bottom:0;width:2px;background:#E2E8F0}
.tl-item{display:flex;gap:12px;margin-bottom:14px;position:relative;cursor:pointer}
.tl-year{width:60px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;padding-top:16px}
.tl-year-badge{padding:3px 8px;border-radius:7px;font-size:10px;font-weight:800;text-align:center;min-width:40px}
.y2020{background:#EDE9FE;color:#6D28D9}
.y2021{background:#EDE9FE;color:#6D28D9}
.y2022{background:#EDE9FE;color:#6D28D9}
.y2023{background:#EDE9FE;color:#6D28D9}
.y2024{background:#FEF3C7;color:#92400E}
.y2025{background:#DBEAFE;color:#1E40AF}
.y2026{background:#D1FAE5;color:#065F46}
.tl-dot-wrap{display:flex;align-items:flex-start;padding-top:18px}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;position:relative;z-index:1;border:2px solid #fff;box-shadow:0 0 0 2px}
.tl-card{flex:1;background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:14px 16px;transition:all .15s}
.tl-card:hover{border-color:#93C5FD;box-shadow:0 4px 12px rgba(37,99,235,.08)}
.tl-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.tl-co-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tl-co-name{font-size:11px;font-weight:800}
.tl-co-type{font-size:9px;padding:2px 7px;border-radius:999px;font-weight:700}
.tl-title{font-size:13px;font-weight:700;color:#1E293B;margin-bottom:4px}
.tl-desc{font-size:11px;color:#64748B;line-height:1.6}
.tl-vendor{font-size:10px;color:#94A3B8;margin-top:6px;font-weight:500}
.tl-vendor span{color:#475569;font-weight:600}
.tl-empty{padding:60px;text-align:center;color:#94A3B8;font-size:13px}
.trend-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#94A3B8}
.trend-placeholder-icon{font-size:48px}
.trend-placeholder-text{font-size:14px;font-weight:500}

/* ── DETAIL PANEL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.detail{position:fixed;top:0;right:0;height:100vh;width:400px;background:#fff;border-left:2px solid #E2E8F0;z-index:51;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.detail.open{transform:translateX(0)}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
.d-top{padding:20px;border-bottom:2px solid #F1F5F9;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:#F8FAFC}
.d-close{width:28px;height:28px;border-radius:50%;background:#E2E8F0;border:none;color:#64748B;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.d-close:hover{background:#CBD5E1;color:#1E293B}
.d-co-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.d-co-name{font-size:12px;font-weight:800}
.d-cat-badge{padding:2px 8px;border-radius:999px;font-size:9px;font-weight:800}
.d-title{font-size:16px;font-weight:800;color:#1E293B;line-height:1.4}
.d-body{padding:20px;flex:1}
.d-sec{margin-bottom:18px}
.d-sec-lbl{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#94A3B8;margin-bottom:8px}
.d-sec-txt{font-size:12px;color:#475569;line-height:1.8;background:#F8FAFC;padding:12px 14px;border-radius:10px;border:1px solid #E2E8F0}
.d-vendor-box{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:10px}
.d-vendor-name{font-size:13px;font-weight:800;color:#2563EB}
.d-vendor-sub{font-size:10px;color:#93C5FD}
.d-art-btn{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:10px;text-decoration:none;transition:all .15s;margin-top:8px}
.d-art-btn:hover{background:#DCFCE7;transform:translateY(-1px);box-shadow:0 4px 10px rgba(22,163,74,.15)}
.d-art-title{font-size:12px;font-weight:700;color:#16A34A}
.d-art-date{font-size:10px;color:#86EFAC;margin-top:1px}
.d-art-arr{color:#16A34A;font-size:14px;font-weight:700}
.d-year-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;margin-top:10px}
</style>
</head>
<body>

<div class="top-header">
  <div>
    <div class="header-eyebrow">Insurance × AI / Digital</div>
    <div class="header-title">보험사 AI·Digital 사례 매트릭스</div>
  </div>
  <div class="header-badge">2020~2026.04 · 내부 스터디용</div>
  <div class="view-toggle">
    <button class="vt-btn active" id="btn-matrix" onclick="switchView('matrix')">🏢 회사별</button>
    <button class="vt-btn" id="btn-trend" onclick="switchView('trend')">📈 케이스 트렌드</button>
  </div>
</div>

<div class="year-bar">
  <span class="year-label">연도 필터</span>
  <button class="yf-btn active" onclick="setYear('all')">전체</button>
  <button class="yf-btn era-legacy" onclick="setYear('legacy')">2020~2023</button>
  <button class="yf-btn" onclick="setYear(2024)">2024</button>
  <button class="yf-btn" onclick="setYear(2025)">2025</button>
  <button class="yf-btn" onclick="setYear(2026)">2026</button>
  <div class="total-count">표시 <span id="totalCount">0</span>건</div>
</div>

<div id="matrixView" class="main-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content-area">
    <div class="col-headers">
      <div style="padding:10px 12px;border-right:1px solid #E2E8F0"></div>
      <div class="col-hdr"><span class="col-icon">👥</span><div><div class="col-hdr-title">고객</div><div class="col-hdr-sub">보험금·청구·가입</div></div></div>
      <div class="col-hdr"><span class="col-icon">👤</span><div><div class="col-hdr-title">Agent / 설계사</div><div class="col-hdr-sub">영업지원·훈련</div></div></div>
      <div class="col-hdr"><span class="col-icon">💼</span><div><div class="col-hdr-title">임직원</div><div class="col-hdr-sub">내부업무·심사</div></div></div>
    </div>
    <div class="table-body" id="tableBody"></div>
  </div>
</div>

<div id="trendView" class="main-layout" style="display:none">
  <div class="trend-sidebar" id="trendSidebar"></div>
  <div class="trend-main" id="trendMain">
    <div class="trend-placeholder">
      <div class="trend-placeholder-icon">📊</div>
      <div class="trend-placeholder-text">왼쪽에서 케이스 유형을 선택해주세요</div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail">
  <div class="d-top">
    <div style="flex:1">
      <div class="d-co-row"><span class="d-co-name" id="dCo"></span><span class="d-cat-badge" id="dCat"></span></div>
      <div class="d-title" id="dTitle"></div>
      <div class="d-year-badge" id="dYearBadge"></div>
    </div>
    <button class="d-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="d-body">
    <div class="d-sec"><div class="d-sec-lbl">도입 내용</div><div class="d-sec-txt" id="dDetail"></div></div>
    <div class="d-sec">
      <div class="d-sec-lbl">솔루션 업체</div>
      <div class="d-vendor-box"><span style="font-size:18px">🏭</span><div><div class="d-vendor-name" id="dVendor"></div><div class="d-vendor-sub">AI 솔루션 파트너</div></div></div>
    </div>
    <div class="d-sec">
      <div class="d-sec-lbl">출처 기사</div>
      <a class="d-art-btn" id="dArtBtn" href="#" target="_blank">
        <div style="flex:1"><div class="d-art-title">기사 원문 보기</div><div class="d-art-date" id="dDate"></div></div>
        <span class="d-art-arr">→</span>
      </a>
    </div>
  </div>
</div>

<script>
// ─── COMPANIES ───
const COMPANIES=[
  // 생보
  {id:"kyobo",name:"교보생명",type:"생보",color:"#2563EB"},

  2021:{bg:"#EDE9FE",color:"#6D28D9",border:"#C4B5FD"},

  // ── 2020~2023 LEGACY ──

// ─── STATE ───
let selCo=null, selCT="ocr", curYear="all", curView="matrix";

function matchYear(c){
  if(curYear==="all") return true;
  if(curYear==="legacy") return c.year<=2023;
  return c.year===curYear;
}
function setYear(y){
  curYear=y;
  document.querySelectorAll(".yf-btn").forEach(b=>b.classList.remove("active"));
  const map={"all":0,"legacy":1,2024:2,2025:3,2026:4};
  document.querySelectorAll(".yf-btn")[map[y]]?.classList.add("active");
  render();
}
function switchView(v){
  curView=v;
  document.getElementById("matrixView").style.display=v==="matrix"?"flex":"none";
  document.getElementById("trendView").style.display=v==="trend"?"flex":"none";
  document.getElementById("btn-matrix").classList.toggle("active",v==="matrix");
  document.getElementById("btn-trend").classList.toggle("active",v==="trend");
  render();
}
function render(){
  if(curView==="matrix"){ renderSidebar(); renderTable(); }
  else { renderTrendSidebar(); renderTrendMain(); }
  document.getElementById("totalCount").textContent=CASES.filter(c=>matchYear(c)).length;
}

// ─── SIDEBAR ───
function renderSidebar(){
  const el=document.getElementById("sidebar");
  const total=CASES.filter(c=>matchYear(c)).length;
  let h=`<div class="co-item ${selCo===null?"active":""}" onclick="selectCo(null)">
    <div class="co-dot" style="background:#2563EB"></div>
    <div class="co-name">전체 보기</div>
    <div class="co-cnt">${total}</div>
  </div><div class="sidebar-div"></div>
  <div class="group-label">생보</div>`;
  COMPANIES.filter(c=>c.type==="생보").forEach(co=>{
    const cnt=CASES.filter(c=>c.co===co.id&&matchYear(c)).length;
    h+=`<div class="co-item ${selCo===co.id?"active":""}" onclick="selectCo('${co.id}')">
      <div class="co-dot" style="background:${co.color}"></div>
      <div class="co-name">${co.name}</div>
      ${cnt>0?`<div class="co-cnt">${cnt}</div>`:""}
    </div>`;
  });
  h+=`<div class="sidebar-div"></div><div class="group-label">손보</div>`;
  COMPANIES.filter(c=>c.type==="손보").forEach(co=>{
    const cnt=CASES.filter(c=>c.co===co.id&&matchYear(c)).length;
    h+=`<div class="co-item ${selCo===co.id?"active":""}" onclick="selectCo('${co.id}')">
      <div class="co-dot" style="background:${co.color}"></div>
      <div class="co-name">${co.name}</div>
      ${cnt>0?`<div class="co-cnt">${cnt}</div>`:""}
    </div>`;
  });
  el.innerHTML=h;
}

// ─── TABLE ───
function renderTable(){
  const el=document.getElementById("tableBody");
  const cos=selCo?COMPANIES.filter(c=>c.id===selCo):COMPANIES;
  let h="";
  cos.forEach(co=>{
    const casesFor=cat=>CASES.filter(c=>c.co===co.id&&c.cat===cat&&matchYear(c));
    const hasCases=CASES.filter(c=>c.co===co.id&&matchYear(c)).length>0;
    if(!hasCases && selCo===null) return;
    const tc=co.type==="생보"?"#1D4ED8":"#DC2626";
    const tb=co.type==="생보"?"#DBEAFE":"#FEE2E2";
    h+=`<div class="trow ${selCo===co.id?"hl":""}">
      <div class="row-co">
        <div class="row-co-name" style="color:${co.color}">${co.name}</div>
        <span class="row-co-type" style="background:${tb};color:${tc}">${co.type}</span>
      </div>`;
    ["고객","agent","임직원"].forEach(cat=>{
      const cats=casesFor(cat);
      if(!cats.length){h+=`<div class="cell-empty"><div class="empty-dash"></div></div>`;}
      else{
        const cfg=CAT_CFG[cat];
        h+=`<div class="row-cell">`;
        cats.forEach(c=>{
          const yc=YEAR_CFG[c.year]||{bg:"#F1F5F9",color:"#475569",border:"#CBD5E1"};
          h+=`<div class="chip" style="background:${cfg.bg};border-color:${cfg.border}" onclick="openDetail(${c.id})">
            <div>
              <div class="chip-title" style="color:${cfg.text}">${c.title}</div>
              <div class="chip-vendor" style="color:${cfg.text}">${c.vendor}</div>
            </div>
            <span class="chip-year" style="background:${yc.bg};color:${yc.color};border:1.5px solid ${yc.border}">${c.year}</span>
          </div>`;
        });
        h+=`</div>`;
      }
    });
    h+=`</div>`;
  });
  if(!h) el.innerHTML=`<div style="padding:40px;text-align:center;color:#94A3B8;font-size:13px">선택한 연도에 해당 회사의 사례가 없습니다</div>`;
  else el.innerHTML=h;
}

// ─── TREND ───
function renderTrendSidebar(){
  const el=document.getElementById("trendSidebar");
  let h=`<div class="group-label">케이스 유형</div>`;
  CASE_TYPES.forEach(ct=>{
    const cnt=CASES.filter(c=>c.caseType===ct.id&&matchYear(c)).length;
    h+=`<div class="ct-item ${selCT===ct.id?"active":""}" onclick="selectCT('${ct.id}')">
      <span class="ct-icon">${ct.icon}</span>
      <div class="ct-name">${ct.name}</div>
      <div class="ct-cnt">${cnt}</div>
    </div>`;
  });
  el.innerHTML=h;
}

function renderTrendMain(){
  const el=document.getElementById("trendMain");
  const ct=CASE_TYPES.find(c=>c.id===selCT);
  if(!ct){el.innerHTML=`<div class="trend-placeholder"><div class="trend-placeholder-icon">📊</div><div class="trend-placeholder-text">케이스 유형을 선택해주세요</div></div>`;return;}
  const cases=CASES.filter(c=>c.caseType===ct.id&&matchYear(c)).sort((a,b)=>a.year-b.year||(a.date>b.date?1:-1));
  const companies=[...new Set(cases.map(c=>c.co))];
  let h=`<div class="trend-header">
    <div class="trend-h-icon">${ct.icon}</div>
    <div class="trend-h-title">${ct.name}</div>
    <div class="trend-h-desc">${ct.desc}</div>
    <div class="trend-h-pills">
      <span class="trend-h-pill" style="background:#DBEAFE;color:#1E40AF">📌 ${cases.length}건</span>
      <span class="trend-h-pill" style="background:#D1FAE5;color:#065F46">🏢 ${companies.length}개사 도입</span>
      ${cases.length>0?`<span class="trend-h-pill" style="background:#FEF3C7;color:#92400E">📅 최초 ${Math.min(...cases.map(c=>c.year))}년</span>`:""}
    </div>
  </div>`;
  if(!cases.length){h+=`<div class="tl-empty">선택한 연도 필터에 해당하는 사례가 없습니다.</div>`;el.innerHTML=h;return;}
  h+=`<div class="trend-timeline">`;
  cases.forEach(c=>{
    const co=COMPANIES.find(x=>x.id===c.co);
    const yc=YEAR_CFG[c.year]||{bg:"#F1F5F9",color:"#475569",border:"#CBD5E1"};
    const tc=co.type==="생보"?"#1D4ED8":"#DC2626";
    const tb=co.type==="생보"?"#DBEAFE":"#FEE2E2";
    const isLegacy=c.year<=2023;
    h+=`<div class="tl-item" onclick="openDetail(${c.id})">
      <div class="tl-year"><span class="tl-year-badge y${c.year}">${c.year}</span></div>
      <div class="tl-dot-wrap"><div class="tl-dot" style="background:${co.color};box-shadow:0 0 0 2px ${co.color}33"></div></div>
      <div class="tl-card">
        <div class="tl-card-top">
          <div class="tl-co-dot" style="background:${co.color}"></div>
          <div class="tl-co-name" style="color:${co.color}">${co.name}</div>
          <span class="tl-co-type" style="background:${tb};color:${tc}">${co.type}</span>
          ${isLegacy?`<span style="font-size:9px;padding:2px 7px;border-radius:999px;background:#EDE9FE;color:#6D28D9;font-weight:700;margin-left:auto">레거시</span>`:""}
        </div>
        <div class="tl-title">${c.title}</div>
        <div class="tl-desc">${c.detail.substring(0,90)}${c.detail.length>90?"...":""}</div>
        <div class="tl-vendor">솔루션: <span>${c.vendor}</span></div>
      </div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function selectCo(id){selCo=id;render();}
function selectCT(id){selCT=id;renderTrendMain();renderTrendSidebar();}

// ─── DETAIL ───
function openDetail(id){
  const c=CASES.find(x=>x.id===id);if(!c)return;
  const co=COMPANIES.find(x=>x.id===c.co);
  const cfg=CAT_CFG[c.cat];
  const yc=YEAR_CFG[c.year]||{bg:"#F1F5F9",color:"#475569",border:"#CBD5E1"};
  document.getElementById("dCo").textContent=co.name;
  document.getElementById("dCo").style.color=co.color;
  document.getElementById("dCat").textContent=CAT_LBL[c.cat];
  document.getElementById("dCat").style.cssText=`background:${cfg.bg};border:1.5px solid ${cfg.border};color:${cfg.text}`;
  document.getElementById("dTitle").textContent=c.title;
  document.getElementById("dDetail").textContent=c.detail;
  document.getElementById("dVendor").textContent=c.vendor;
  document.getElementById("dDate").textContent=`기사 날짜: ${c.date}`;
  document.getElementById("dYearBadge").textContent=`${c.year}년 도입`;
  document.getElementById("dYearBadge").style.cssText=`background:${yc.bg};color:${yc.color};border:1.5px solid ${yc.border}`;
  document.getElementById("dArtBtn").href=c.url;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("detail").classList.add("open");
}
function closeDetail(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("detail").classList.remove("open");
}

render();
</script>
