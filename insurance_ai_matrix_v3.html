const CAT_CONFIG={"고객":{color:"#3B82F6",bg:"rgba(59,130,246,0.1)",border:"rgba(59,130,246,0.3)"},"agent":{color:"#F97316",bg:"rgba(249,115,22,0.1)",border:"rgba(249,115,22,0.3)"},"임직원":{color:"#10B981",bg:"rgba(16,185,129,0.1)",border:"rgba(16,185,129,0.3)"}};
const CAT_LABEL={"고객":"고객","agent":"Agent / 설계사","임직원":"임직원"};
let selectedCompany=null;

function countCases(id){return CASES.filter(c=>c.co===id).length;}

function renderSidebar(){
  const el=document.getElementById("sidebar");
  const sengbo=COMPANIES.filter(c=>c.type==="생보");
  const sonbo=COMPANIES.filter(c=>c.type==="손보");
  let h="";
  h+=`<div class="company-item ${selectedCompany===null?"active":""}" onclick="selectCompany(null)"><div class="co-dot" style="background:#FBBF24"></div><div class="co-name">전체 보기</div><div class="co-count">${CASES.length}</div></div><div class="sidebar-divider"></div>`;
  h+=`<div class="group-label">생보</div>`;
  sengbo.forEach(co=>{const cnt=countCases(co.id);h+=`<div class="company-item ${selectedCompany===co.id?"active":""}" onclick="selectCompany('${co.id}')"><div class="co-dot" style="background:${co.color}"></div><div class="co-name">${co.name}</div>${cnt>0?`<div class="co-count">${cnt}</div>`:""}</div>`;});
  h+=`<div class="sidebar-divider"></div><div class="group-label">손보</div>`;
  sonbo.forEach(co=>{const cnt=countCases(co.id);h+=`<div class="company-item ${selectedCompany===co.id?"active":""}" onclick="selectCompany('${co.id}')"><div class="co-dot" style="background:${co.color}"></div><div class="co-name">${co.name}</div>${cnt>0?`<div class="co-count">${cnt}</div>`:""}</div>`;});
  el.innerHTML=h;
}

function renderTable(){
  const el=document.getElementById("tableBody");
  const companies=selectedCompany?COMPANIES.filter(c=>c.id===selectedCompany):COMPANIES;
  let h="";
  companies.forEach(co=>{
    const casesFor=cat=>CASES.filter(c=>c.co===co.id&&c.cat===cat);
    const tc=co.type==="생보"?"#60A5FA":"#F87171";
    const tb=co.type==="생보"?"rgba(96,165,250,0.12)":"rgba(248,113,113,0.12)";
    h+=`<div class="table-row ${selectedCompany===co.id?"highlighted":""}">`;
    h+=`<div class="row-company"><div class="row-co-name" style="color:${co.color}">${co.name}</div><span class="row-co-type" style="background:${tb};color:${tc}">${co.type}</span></div>`;
    ["고객","agent","임직원"].forEach(cat=>{
      const cats=casesFor(cat);
      if(cats.length===0){h+=`<div class="cell-empty"><div class="empty-dash"></div></div>`;}
      else{
        const cfg=CAT_CONFIG[cat];
        h+=`<div class="row-cell">`;
        cats.forEach(c=>{h+=`<div class="case-chip" style="background:${cfg.bg};border-color:${cfg.border}" onclick="openDetail(${c.id})"><div><div class="chip-title" style="color:${cfg.color}">${c.title}</div><div class="chip-vendor" style="color:${cfg.color}">${c.vendor}</div></div><span class="chip-arrow" style="color:${cfg.color}">›</span></div>`;});
        h+=`</div>`;
      }
    });
    h+=`</div>`;
  });
  el.innerHTML=h;
  const total=companies.reduce((a,co)=>a+CASES.filter(c=>c.co===co.id).length,0);
  const coName=selectedCompany?COMPANIES.find(c=>c.id===selectedCompany)?.name:null;
  document.getElementById("filterCount").textContent=coName?`${coName} (${total}건)`:`전체 ${total}건`;
  document.getElementById("clearBtn").style.display=selectedCompany?"block":"none";
}

function selectCompany(id){selectedCompany=id;renderSidebar();renderTable();}
function clearFilter(){selectCompany(null);}

function openDetail(caseId){
  const c=CASES.find(x=>x.id===caseId);if(!c)return;
  const co=COMPANIES.find(x=>x.id===c.co);
  const cfg=CAT_CONFIG[c.cat];
  document.getElementById("dCompany").textContent=co.name;
  document.getElementById("dCompany").style.color=co.color;
  document.getElementById("dCategory").textContent=CAT_LABEL[c.cat];
  document.getElementById("dCategory").style.background=cfg.bg;
  document.getElementById("dCategory").style.border=`1px solid ${cfg.border}`;
  document.getElementById("dCategory").style.color=cfg.color;
  document.getElementById("dTitle").textContent=c.title;
  document.getElementById("dDetail").textContent=c.detail;
  document.getElementById("dVendor").textContent=c.vendor;
  document.getElementById("dDate").textContent=`기사 날짜: ${c.date}`;
  document.getElementById("dArticleBtn").href=c.url;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("detailPanel").classList.add("open");
}
function closeDetail(){document.getElementById("overlay").classList.remove("open");document.getElementById("detailPanel").classList.remove("open");}

renderSidebar();renderTable();
