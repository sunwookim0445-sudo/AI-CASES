<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #060e1c;
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── TOP HEADER ── */
.top-header {
  height: 52px;
  background: #0a1628;
  border-bottom: 1px solid #1e3a5f;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
}
.header-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: #FBBF24; text-transform: uppercase; }
.header-title { font-size: 15px; font-weight: 800; color: #fff; }
.header-badge {
  margin-left: auto;
  padding: 3px 10px;
  border-radius: 999px;
  background: rgba(251,191,36,0.12);
  border: 1px solid rgba(251,191,36,0.3);
  font-size: 10px;
  color: #FBBF24;
  font-weight: 600;
}

/* ── MAIN LAYOUT ── */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: 168px;
  flex-shrink: 0;
  background: #080f1e;
  border-right: 1px solid #1e293b;
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: #1e3a5f; }

.group-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: #475569;
  text-transform: uppercase;
  padding: 10px 14px 5px;
}
.company-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
.company-item:hover { background: rgba(255,255,255,0.04); }
.company-item.active {
  background: rgba(56,189,248,0.08);
  border-left-color: #38bdf8;
}
.company-item.active .co-name { color: #38bdf8; }
.co-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.co-name { font-size: 11px; font-weight: 500; color: #94a3b8; }
.co-count {
  margin-left: auto;
  font-size: 9px;
  color: #334155;
  background: #0f1f35;
  padding: 1px 5px;
  border-radius: 999px;
}
.sidebar-divider { height: 1px; background: #1e293b; margin: 8px 0; }

/* ── CONTENT AREA ── */
.content-area {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── COL HEADERS ── */
.col-headers {
  display: grid;
  grid-template-columns: 120px 1fr 1fr 1fr;
  border-bottom: 1px solid #1e293b;
  flex-shrink: 0;
  background: #080f1e;
}
.col-header-company { padding: 10px 14px; }
.col-header {
  padding: 10px 16px;
  border-left: 1px solid #1e293b;
  display: flex;
  align-items: center;
  gap: 8px;
}
.col-header-title { font-size: 12px; font-weight: 700; color: #e2e8f0; }
.col-header-sub { font-size: 10px; color: #475569; }
.col-icon { font-size: 16px; }

/* ── TABLE BODY ── */
.table-body {
  flex: 1;
  overflow-y: auto;
}
.table-body::-webkit-scrollbar { width: 4px; }
.table-body::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

.table-row {
  display: grid;
  grid-template-columns: 120px 1fr 1fr 1fr;
  border-bottom: 1px solid #0f1f35;
  min-height: 64px;
  transition: background 0.1s;
}
.table-row:hover { background: rgba(255,255,255,0.015); }
.table-row.highlighted { background: rgba(56,189,248,0.04); }

.row-company {
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 3px;
  border-right: 1px solid #0f1f35;
}
.row-co-name { font-size: 11px; font-weight: 700; color: #cbd5e1; }
.row-co-type {
  display: inline-block;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 999px;
  font-weight: 600;
}

.row-cell {
  padding: 8px 10px;
  border-left: 1px solid #0f1f35;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-content: flex-start;
}

/* ── CASE CHIP ── */
.case-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 7px;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.15s;
  max-width: 100%;
}
.case-chip:hover { transform: translateY(-1px); filter: brightness(1.1); }
.chip-title { font-size: 10px; font-weight: 600; line-height: 1.35; }
.chip-vendor { font-size: 9px; opacity: 0.65; }
.chip-arrow { font-size: 9px; opacity: 0.5; flex-shrink: 0; }

/* ── DETAIL PANEL ── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.detail-overlay.open { opacity: 1; pointer-events: all; }

.detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: 380px;
  background: #0a1628;
  border-left: 1px solid #1e3a5f;
  z-index: 51;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel::-webkit-scrollbar { width: 3px; }
.detail-panel::-webkit-scrollbar-thumb { background: #1e3a5f; }

.detail-top {
  padding: 20px 20px 16px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.detail-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #1e293b;
  border: none;
  color: #94a3b8;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}
.detail-close:hover { background: #334155; color: #fff; }
.detail-company-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.detail-company-name { font-size: 12px; font-weight: 700; }
.detail-category-badge {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 700;

.detail-title { font-size: 16px; font-weight: 800; color: #fff; line-height: 1.4; }

.detail-body { padding: 20px; flex: 1; }
.detail-section { margin-bottom: 20px; }
.detail-section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #475569;
  margin-bottom: 8px;

.detail-section-text { font-size: 13px; color: #94a3b8; line-height: 1.75; }

.detail-vendor-box {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 10px;

.vendor-name { font-size: 13px; font-weight: 700; color: #7dd3fc; }
.vendor-sub { font-size: 10px; color: #475569; }

.detail-article-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  background: rgba(16,185,129,0.06);
  border: 1px solid rgba(16,185,129,0.25);
  border-radius: 10px;
  text-decoration: none;
  transition: all 0.15s;
  margin-top: 8px;

.detail-article-btn:hover { background: rgba(16,185,129,0.12); transform: translateY(-1px); }

.article-title { font-size: 12px; font-weight: 600; color: #34D399; }
.article-date { font-size: 10px; color: #475569; margin-top: 1px; }
.article-arrow { color: #34D399; font-size: 14px; }

  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;

</head>

// ─── STATE ───────────────────────────────────────────────
let selectedCompany = null;

// ─── CATEGORY CONFIG ────────────────────────────────────
const CAT_CONFIG = {
  "고객":   { color: "#3B82F6", bg: "rgba(59,130,246,0.1)",  border: "rgba(59,130,246,0.3)" },
  "agent":  { color: "#F97316", bg: "rgba(249,115,22,0.1)", border: "rgba(249,115,22,0.3)" },
  "임직원": { color: "#10B981", bg: "rgba(16,185,129,0.1)", border: "rgba(16,185,129,0.3)" },
};
const CAT_LABEL = { "고객": "고객", "agent": "Agent / 설계사", "임직원": "임직원" };

// ─── COUNT CASES PER COMPANY ─────────────────────────────
function countCases(coId) {
  return CASES.filter(c => c.co === coId).length;
}

// ─── RENDER SIDEBAR ──────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById("sidebar");
  const sengbo = COMPANIES.filter(c => c.type === "생보");
  const sonbo  = COMPANIES.filter(c => c.type === "손보");

  let html = "";

  // 전체보기
  html += `<div class="company-item ${selectedCompany===null?"active":""}" onclick="selectCompany(null)">
    <div class="co-dot" style="background:#FBBF24"></div>
    <div class="co-name">전체 보기</div>
    <div class="co-count">${CASES.length}</div>
  </div>`;
  html += `<div class="sidebar-divider"></div>`;

  html += `<div class="group-label">생보</div>`;
  sengbo.forEach(co => {
    const cnt = countCases(co.id);
    html += `<div class="company-item ${selectedCompany===co.id?"active":""}" onclick="selectCompany('${co.id}')">
      <div class="co-dot" style="background:${co.color}"></div>
      <div class="co-name">${co.name}</div>
      ${cnt > 0 ? `<div class="co-count">${cnt}</div>` : ""}
    </div>`;
  });

  html += `<div class="sidebar-divider"></div>`;
  html += `<div class="group-label">손보</div>`;
  sonbo.forEach(co => {
    const cnt = countCases(co.id);
    html += `<div class="company-item ${selectedCompany===co.id?"active":""}" onclick="selectCompany('${co.id}')">
      <div class="co-dot" style="background:${co.color}"></div>
      <div class="co-name">${co.name}</div>
      ${cnt > 0 ? `<div class="co-count">${cnt}</div>` : ""}
    </div>`;
  });

  el.innerHTML = html;
}

// ─── RENDER TABLE ────────────────────────────────────────
function renderTable() {
  const el = document.getElementById("tableBody");
  const companies = selectedCompany
    ? COMPANIES.filter(c => c.id === selectedCompany)
    : COMPANIES;

  let html = "";
  companies.forEach(co => {
    const casesFor = (cat) => CASES.filter(c => c.co === co.id && c.cat === cat);
    const hasCases = CASES.filter(c => c.co === co.id).length > 0;

    const typeColor = co.type === "생보" ? "#60A5FA" : "#F87171";
    const typeBg    = co.type === "생보" ? "rgba(96,165,250,0.12)" : "rgba(248,113,113,0.12)";

    html += `<div class="table-row ${selectedCompany === co.id ? "highlighted" : ""}">`;

    // Company cell
    html += `<div class="row-company">
      <div class="row-co-name" style="color:${co.color}">${co.name}</div>
      <span class="row-co-type" style="background:${typeBg};color:${typeColor}">${co.type}</span>
    </div>`;

    // 3 category cells
    ["고객","agent","임직원"].forEach(cat => {
      const cats = casesFor(cat);
      if (cats.length === 0) {
        html += `<div class="cell-empty"><div class="empty-dash"></div></div>`;
      } else {
        const cfg = CAT_CONFIG[cat];
        html += `<div class="row-cell">`;
        cats.forEach(c => {
          html += `<div class="case-chip"
            style="background:${cfg.bg};border-color:${cfg.border}"
            onclick="openDetail(${c.id})">
            <div>
              <div class="chip-title" style="color:${cfg.color}">${c.title}</div>
              <div class="chip-vendor" style="color:${cfg.color}">${c.vendor}</div>
            </div>
            <span class="chip-arrow" style="color:${cfg.color}">›</span>
          </div>`;
        });
        html += `</div>`;
      }
    });

    html += `</div>`;
  });

  el.innerHTML = html;

  // update filter bar
  const total = companies.reduce((a,co) => a + CASES.filter(c => c.co === co.id).length, 0);
  const coName = selectedCompany ? COMPANIES.find(c => c.id === selectedCompany)?.name : null;
  document.getElementById("filterCount").textContent = coName ? `${coName} (${total}건)` : `전체 ${total}건`;
  document.getElementById("clearBtn").style.display = selectedCompany ? "block" : "none";
}

// ─── SELECT COMPANY ──────────────────────────────────────
function selectCompany(id) {
  selectedCompany = id;
  renderSidebar();
  renderTable();
}

function clearFilter() {
  selectCompany(null);
}

// ─── OPEN / CLOSE DETAIL ─────────────────────────────────
function openDetail(caseId) {
  const c = CASES.find(x => x.id === caseId);
  if (!c) return;
  const co = COMPANIES.find(x => x.id === c.co);
  const cfg = CAT_CONFIG[c.cat];

  document.getElementById("dCompany").textContent = co.name;
  document.getElementById("dCompany").style.color = co.color;
  document.getElementById("dCategory").textContent = CAT_LABEL[c.cat];
  document.getElementById("dCategory").style.background = cfg.bg;
  document.getElementById("dCategory").style.border = `1px solid ${cfg.border}`;
  document.getElementById("dCategory").style.color = cfg.color;
  document.getElementById("dTitle").textContent = c.title;
  document.getElementById("dDetail").textContent = c.detail;
  document.getElementById("dVendor").textContent = c.vendor;
  document.getElementById("dDate").textContent = `기사 날짜: ${c.date}`;
  document.getElementById("dArticleBtn").href = c.url;

  document.getElementById("overlay").classList.add("open");
  document.getElementById("detailPanel").classList.add("open");
}

function closeDetail() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("detailPanel").classList.remove("open");
}

// ─── INIT ────────────────────────────────────────────────
renderSidebar();
renderTable();
</script>
